name: Update README index

on:
  push:
    branches: [ master, main ]

# Allow the workflow to push its own commit back to the repo
permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate README index
        run: python3 generate_readme.py

      - name: Commit changes if README changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: auto-update write-up index"
            git push
          else
            echo "No changes to README.md"
          fi
